<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Pizza Wheel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a0a0a;color:#fff;font-family:"Space Grotesk",sans-serif;}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:32px 16px 48px;}
.hero{text-align:center;margin-bottom:24px;}
.hero-title{font-family:"Bebas Neue",sans-serif;font-size:68px;letter-spacing:4px;line-height:0.95;}
.hero-title span{color:#ff4500;}
.hero-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-top:6px;}
.phase-badge{display:inline-flex;align-items:center;gap:8px;background:#161616;border:1px solid #ff4500;border-radius:20px;padding:6px 16px;margin-top:10px;font-size:12px;color:#ff4500;font-weight:500;}
.phase-dot{width:8px;height:8px;border-radius:50%;background:#ff4500;flex-shrink:0;}
.main{display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:1020px;}
.wheel-col{display:flex;flex-direction:column;align-items:center;gap:18px;}
.canvas-wrap{position:relative;width:420px;height:420px;}
canvas{display:block;border-radius:50%;}
.pointer-wrap{position:absolute;top:0;left:50%;transform:translateX(-50%);}
.pointer-arrow{width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:34px solid #ff4500;margin:0 auto;}
.pointer-line{width:2px;height:20px;background:#ff4500;margin:0 auto;}
.spin-btn{background:#ff4500;color:#fff;border:none;font-family:"Bebas Neue",sans-serif;font-size:30px;letter-spacing:4px;padding:16px 64px;border-radius:4px;cursor:pointer;transition:transform 0.1s;width:100%;}
.spin-btn:hover{background:#ff5a14;}
.spin-btn:active{transform:scale(0.97);}
.spin-btn:disabled{background:#222;color:#444;cursor:not-allowed;}
.spin-meta{font-size:11px;color:#444;letter-spacing:1.5px;text-transform:uppercase;text-align:center;}
.right-col{display:flex;flex-direction:column;gap:14px;width:400px;min-width:280px;}
.result-card{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:22px;transition:border-color 0.3s;}
.result-card.active{border-color:#ff4500;}
.result-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:6px;}
.result-name{font-family:"Bebas Neue",sans-serif;font-size:38px;line-height:1;color:#fff;margin-bottom:14px;min-height:42px;}
.dist-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.dist-box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:12px 14px;}
.dist-loc{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:3px;}
.dist-miles{font-family:"Bebas Neue",sans-serif;font-size:30px;color:#ff4500;line-height:1;}
.dist-sub{font-size:10px;color:#444;margin-top:2px;}
.btn-row{display:flex;gap:8px;}
.action-btn{flex:1;padding:10px 14px;border-radius:8px;font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #2a2a2a;background:transparent;color:#888;transition:all 0.2s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;}
.action-btn:hover{border-color:#ff4500;color:#ff4500;}
.action-btn.primary{background:#ff4500;border-color:#ff4500;color:#fff;}
.action-btn.primary:hover{background:#ff5a14;}
.training-card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:16px;}
.tc-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:10px;}
.phase-row{display:flex;align-items:center;gap:10px;font-size:12px;color:#444;padding:5px 8px;border-radius:6px;margin-bottom:4px;}
.phase-row.active{background:#161616;border:1px solid #ff4500;color:#fff;}
.phase-row.active .pr-range{color:#ff4500;}
.pr-dot{width:6px;height:6px;border-radius:50%;background:#222;flex-shrink:0;}
.phase-row.active .pr-dot{background:#ff4500;}
.pr-range{font-weight:500;min-width:100px;font-size:11px;}
.pr-now{font-size:10px;color:#333;margin-left:auto;}
.phase-row.active .pr-now{color:#ff4500;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.stat-box{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px;text-align:center;}
.stat-val{font-family:"Bebas Neue",sans-serif;font-size:26px;color:#fff;line-height:1;}
.stat-lbl{font-size:9px;color:#444;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.prog-wrap{padding:0 2px;}
.prog-hd{display:flex;justify-content:space-between;margin-bottom:5px;font-size:10px;}
.prog-bar{width:100%;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:#ff4500;border-radius:2px;transition:width 0.5s;}
.history{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:14px;display:none;}
.hist-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:8px;}
.hist-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;}
.hist-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;}
.hist-num{font-family:"Bebas Neue",sans-serif;font-size:15px;color:#333;min-width:18px;}
.hist-item.latest .hist-name,.hist-item.latest .hist-num{color:#ff4500;}
.skip-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;}
.skip-toggle input{accent-color:#ff4500;}
@media(max-width:640px){
  .hero-title{font-size:48px;}
  .canvas-wrap{width:320px;height:320px;}
  .right-col{width:100%;}
  .result-name{font-size:28px;}
  .spin-btn{font-size:24px;padding:14px 32px;}
}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-title">NYC<br><span>Pizza</span><br>Wheel</div>
  <div class="hero-sub" id="heroSub">978 spots across NYC</div>
  <div class="phase-badge"><div class="phase-dot"></div><span id="phaseLabel">Loading...</span></div>
</div>

<div class="main">
  <div class="wheel-col">
    <div class="canvas-wrap">
      <canvas id="wheel" width="420" height="420"></canvas>
      <div class="pointer-wrap"><div class="pointer-line"></div><div class="pointer-arrow"></div></div>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
    <div class="spin-meta" id="spinMeta">filtered to your training zone</div>
  </div>

  <div class="right-col">
    <div class="result-card" id="resultCard">
      <div class="result-eyebrow">Your next run is to...</div>
      <div class="result-name" id="resultName">Waiting for spin</div>
      <div class="dist-grid">
        <div class="dist-box">
          <div class="dist-loc">From home</div>
          <div class="dist-miles" id="homeMi">—</div>
          <div class="dist-sub" id="homeEta">693 Quincy St</div>
        </div>
        <div class="dist-box">
          <div class="dist-loc">From work</div>
          <div class="dist-miles" id="workMi">—</div>
          <div class="dist-sub" id="workEta">1 WTC</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="action-btn" onclick="openMaps('home')">Maps from Home</button>
        <button class="action-btn primary" onclick="openMaps('work')">Maps from Work</button>
      </div>
    </div>

    <div class="training-card">
      <div class="tc-title">Training phases</div>
      <div id="phaseList"></div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-val" id="stSpins">0</div><div class="stat-lbl">Spins</div></div>
      <div class="stat-box"><div class="stat-val" id="stVisited">0</div><div class="stat-lbl">Visited</div></div>
      <div class="stat-box"><div class="stat-val" id="stLeft">—</div><div class="stat-lbl">In zone</div></div>
    </div>

    <div class="prog-wrap">
      <div class="prog-hd">
        <span style="letter-spacing:2px;text-transform:uppercase;color:#444;">All 978 progress</span>
        <span style="color:#555;" id="progPct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>

    <div class="history" id="histBox">
      <div class="hist-title">Recent spins</div>
      <div class="hist-list" id="histList"></div>
    </div>

    <label class="skip-toggle">
      <input type="checkbox" id="skipVisited" checked onchange="refreshWheel()">
      Skip already-spun places
    </label>
  </div>
</div>

const HOME = {lat:40.6832,lng:-73.9235,name:"693 Quincy St"};
const WORK = {lat:40.7127,lng:-74.0134,name:"1 WTC"};
const RACE_DATE = new Date("2026-11-01");

const PHASES = [
  {label:"Post-half build",  daysMin:180, daysMax:9999, minMi:3,  maxMi:6,  desc:"3–6 mi runs"},
  {label:"Marathon base",    daysMin:120, daysMax:180,  minMi:4,  maxMi:9,  desc:"4–9 mi runs"},
  {label:"Long run phase",   daysMin:60,  daysMax:120,  minMi:7,  maxMi:13, desc:"7–13 mi runs"},
  {label:"Peak training",    daysMin:14,  daysMax:60,   minMi:10, maxMi:18, desc:"10–18 mi runs"},
  {label:"Taper",            daysMin:0,   daysMax:14,   minMi:3,  maxMi:7,  desc:"3–7 mi · taper"},
];

const SLICE_COUNT = 16;
const CX=210, CY=210, R=200;
const COLORS_ODD  = "#161616";
const COLORS_EVEN = "#0e0e0e";

let angle=0, spinning=false, spinCount=0;
let visited=new Set(), history=[], winner="";
let wheelPlaces=[], currentPhase=null, filteredPlaces=[];

function daysToRace(){
  return Math.max(0,Math.floor((RACE_DATE-new Date())/86400000));
}

function getPhase(){
  const d=daysToRace();
  for(const p of PHASES){ if(d>=p.daysMin && d<p.daysMax) return p; }
  return PHASES[0];
}

function approxDist(name,origin){
  if(COORDS[name]){return haversine(origin.lat,origin.lng,COORDS[name][0],COORDS[name][1]);}
  const seed1=name.charCodeAt(0)%100/100;
  const seed2=(name.charCodeAt(1)||65)%100/100;
  const seed3=name.length%20/20;
  const lat=40.62+(seed1*0.18)+(seed3*0.08);
  const lng=-74.06+(seed2*0.16)+(seed1*0.1);
  return haversine(origin.lat,origin.lng,lat,lng);
}

function haversine(la1,lo1,la2,lo2){
  const R=3958.8,dL=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dl/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function buildFilteredPlaces(){
  const p=currentPhase;
  const skip=document.getElementById("skipVisited").checked;
  let pool=PLACES.filter(n=>{
    const d=approxDist(n,HOME);
    return d>=p.minMi && d<=p.maxMi;
  });
  if(pool.length<20) pool=[...PLACES];
  filteredPlaces=pool;
  const available=skip ? pool.filter(n=>!visited.has(n)) : pool;
  return available.length>0 ? available : pool;
}

function loadWheelPlaces(){
  const available=buildFilteredPlaces();
  const shuffled=[...available].sort(()=>Math.random()-0.5);
  wheelPlaces=shuffled.slice(0,SLICE_COUNT);
}

function drawWheel(rot){
  const canvas=document.getElementById("wheel");
  const ctx=canvas.getContext("2d");
  const slice=(2*Math.PI)/SLICE_COUNT;
  ctx.clearRect(0,0,420,420);

  for(let i=0;i<SLICE_COUNT;i++){
    const s=rot+i*slice, e=s+slice;
    ctx.beginPath();
    ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,s,e);
    ctx.closePath();
    ctx.fillStyle=i%2===0?COLORS_ODD:COLORS_EVEN;
    ctx.fill();
    ctx.strokeStyle="#050505";
    ctx.lineWidth=1;
    ctx.stroke();
  }

  for(let i=0;i<SLICE_COUNT;i++){
    const s=rot+i*slice, e=s+slice;
    const mid=s+slice/2;
    ctx.save();
    ctx.translate(CX,CY);
    ctx.rotate(mid);
    const name=(wheelPlaces[i]||"???");
    const display=name.length>18?name.substring(0,17)+"…":name;
    ctx.fillStyle=i%2===0?"#ff4500":"#666";
    ctx.font="500 11px Space Grotesk,sans-serif";
    ctx.textAlign="right";
    ctx.fillText(display,R-10,4);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(CX,CY,R,0,2*Math.PI);
  ctx.strokeStyle="#ff4500";
  ctx.lineWidth=2;
  ctx.stroke();

  for(let i=0;i<SLICE_COUNT;i++){
    const a=rot+i*(2*Math.PI/SLICE_COUNT);
    ctx.beginPath();
    ctx.moveTo(CX+(R-1)*Math.cos(a),CY+(R-1)*Math.sin(a));
    ctx.lineTo(CX+(R+7)*Math.cos(a),CY+(R+7)*Math.sin(a));
    ctx.strokeStyle="#ff4500";
    ctx.lineWidth=1.5;
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(CX,CY,34,0,2*Math.PI);
  ctx.fillStyle="#0a0a0a";
  ctx.fill();
  ctx.strokeStyle="#ff4500";
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.fillStyle="#ff4500";
  ctx.font="700 11px Space Grotesk,sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("NYC",CX,CY);
}

function spin(){
  if(spinning||wheelPlaces.length===0) return;
  spinning=true;
  document.getElementById("spinBtn").disabled=true;
  document.getElementById("resultCard").classList.remove("active");
  document.getElementById("resultName").textContent="...";
  document.getElementById("homeMi").textContent="—";
  document.getElementById("workMi").textContent="—";
  document.getElementById("homeEta").textContent=HOME.name;
  document.getElementById("workEta").textContent=WORK.name;

  const skip=document.getElementById("skipVisited").checked;
  const available=wheelPlaces.filter(n=>!skip||!visited.has(n));
  const pool=available.length>0?available:wheelPlaces;
  winner=pool[Math.floor(Math.random()*pool.length)];
  const slot=wheelPlaces.indexOf(winner);

  const slice=(2*Math.PI)/SLICE_COUNT;
  const slotMid=slot*slice+slice/2;
  const pointer=-Math.PI/2;
  let baseAngle=pointer-slotMid;
  while(baseAngle<0) baseAngle+=2*Math.PI;
  const extraSpins=(5+Math.floor(Math.random()*4))*2*Math.PI;
  const targetAngle=baseAngle+extraSpins;

  const dur=4000+Math.random()*1000;
  const startAngle=angle%(2*Math.PI);
  const t0=performance.now();

  function ease(t){return 1-Math.pow(1-t,4);}

  function frame(now){
    const p=Math.min((now-t0)/dur,1);
    const cur=startAngle+(targetAngle-startAngle)*ease(p);
    angle=cur;
    drawWheel(cur%(2*Math.PI));
    if(p<1){requestAnimationFrame(frame);return;}

    spinning=false;
    spinCount++;
    visited.add(winner);
    document.getElementById("spinBtn").disabled=false;
    document.getElementById("spinBtn").textContent="SPIN AGAIN";
    document.getElementById("resultName").textContent=winner;
    document.getElementById("resultCard").classList.add("active");

    const hd=approxDist(winner,HOME);
    const wd=approxDist(winner,WORK);
    document.getElementById("homeMi").textContent=hd.toFixed(1)+" mi";
    document.getElementById("homeEta").textContent="~"+Math.round(hd*10)+" min run";
    document.getElementById("workMi").textContent=wd.toFixed(1)+" mi";
    document.getElementById("workEta").textContent="~"+Math.round(wd*10)+" min run";

    history.unshift(winner);
    if(history.length>10)history.pop();
    updateStats();
    updateHistory();
    try{localStorage.setItem("lastSpin",winner);}catch(e){}

    loadWheelPlaces();
    document.getElementById("spinMeta").textContent=
      spinCount+" spin"+(spinCount!==1?"s":"")+" · "+
      (filteredPlaces.length-visited.size)+" in zone remaining";
  }
  requestAnimationFrame(frame);
}

function openMaps(from){
  const origin=from==="home"?"693+Quincy+St+Brooklyn+NY":"1+World+Trade+Center+New+York+NY";
  const dest=encodeURIComponent(winner+" New York City");
  window.open("https://www.google.com/maps/dir/"+origin+"/"+dest,"_blank");
}

function updateStats(){
  document.getElementById("stSpins").textContent=spinCount;
  document.getElementById("stVisited").textContent=visited.size;
  document.getElementById("stLeft").textContent=
    Math.max(0,filteredPlaces.filter(n=>!visited.has(n)).length);
  const pct=Math.round((visited.size/PLACES.length)*100);
  document.getElementById("progPct").textContent=pct+"%";
  document.getElementById("progFill").style.width=pct+"%";
}

function updateHistory(){
  document.getElementById("histBox").style.display="block";
  document.getElementById("histList").innerHTML=history.map((n,i)=>
    '<div class="hist-item'+(i===0?" latest":"")+'">'+
    '<span class="hist-num">'+(i+1)+'</span>'+
    '<span class="hist-name">'+n+'</span></div>'
  ).join("");
}

function buildPhaseList(){
  const days=daysToRace();
  const list=document.getElementById("phaseList");
  list.innerHTML=PHASES.map(p=>{
    const active=p===currentPhase;
    return '<div class="phase-row'+(active?" active":"")+'">'+
      '<div class="pr-dot"></div>'+
      '<span class="pr-range">'+p.desc+'</span>'+
      '<span class="pr-now">'+(active?"← now":"")+'</span>'+
      '</div>';
  }).join("");
}

function refreshWheel(){
  loadWheelPlaces();
  drawWheel(angle%(2*Math.PI));
  updateStats();
}

function init(){
  currentPhase=getPhase();
  const days=daysToRace();
  document.getElementById("phaseLabel").textContent=
    currentPhase.label+" · "+currentPhase.desc+" · "+days+" days to race";
  buildPhaseList();
  loadWheelPlaces();
  document.getElementById("heroSub").textContent=
    filteredPlaces.length+" spots in your training zone";
  drawWheel(0);
  updateStats();
}

window.addEventListener("load",init);
</script>
</body>
</html>
